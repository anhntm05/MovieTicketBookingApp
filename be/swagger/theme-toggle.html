<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Professional API documentation for Movie Booking Platform">
  <title>🎬 Movie Booking API Documentation</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap">

  <!-- Swagger UI CSS (served locally) -->
  <link rel="stylesheet" href="/api-docs/swagger-ui.css">

  <!-- Dark Theme CSS -->
  <link rel="stylesheet" type="text/css" href="./dark-theme.css" id="theme-stylesheet">

  <style>
    /* ===== Theme Toggle Container ===== */
    .theme-toggle-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .theme-toggle-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .theme-toggle-btn:hover {
      background: var(--bg-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .theme-toggle-btn:active {
      transform: translateY(0);
    }

    .theme-toggle-btn.active {
      background: var(--accent-blue);
      color: #000;
      border-color: var(--accent-blue);
      box-shadow: 0 4px 12px rgba(88, 166, 255, 0.4);
    }

    .theme-toggle-btn.active:hover {
      background: #7dbeff;
    }

    /* ===== Custom Header ===== */
    .custom-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 2rem;
      margin-bottom: 2rem;
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .custom-header h1 {
      color: var(--text-primary);
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .custom-header p {
      color: var(--text-secondary);
      font-size: 1rem;
      margin: 0;
      line-height: 1.6;
    }

    .custom-header .version-badge {
      display: inline-block;
      background: var(--accent-blue);
      color: #000;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    /* ===== Swagger UI Overrides ===== */
    .swagger-ui .topbar {
      display: none !important;
    }

    /* Main wrapper */
    .swagger-ui {
      padding: 0 !important;
    }

    .swagger-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ===== Loading State ===== */
    .loading-state {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .spinner {
      border: 3px solid var(--border-primary);
      border-top: 3px solid var(--accent-blue);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* ===== Footer ===== */
    .api-footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-primary);
      padding: 2rem;
      margin-top: 4rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .api-footer a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 600;
    }

    .api-footer a:hover {
      text-decoration: underline;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .theme-toggle-container {
        top: 10px;
        right: 10px;
        gap: 5px;
      }

      .theme-toggle-btn {
        padding: 8px 12px;
        font-size: 12px;
      }

      .custom-header {
        padding: 1.5rem;
      }

      .custom-header h1 {
        font-size: 1.5rem;
      }

      .custom-header p {
        font-size: 0.875rem;
      }
    }

    @media (max-width: 480px) {
      .theme-toggle-container {
        flex-direction: column;
        gap: 8px;
      }

      .theme-toggle-btn {
        width: 100%;
        justify-content: center;
      }

      .custom-header {
        padding: 1rem;
      }

      .custom-header h1 {
        font-size: 1.25rem;
        gap: 8px;
      }

      .custom-header h1 span {
        font-size: 1.5rem;
      }
    }

    /* ===== Print Styles ===== */
    @media print {
      .theme-toggle-container,
      .custom-header,
      .api-footer {
        display: none;
      }

      body {
        background: #fff;
        color: #000;
      }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle Buttons -->
  <div class="theme-toggle-container" role="group" aria-label="Theme selector">
    <button
      class="theme-toggle-btn active"
      id="dark-theme-btn"
      aria-pressed="true"
      aria-label="Switch to dark theme"
      title="Dark Theme">
      🌙 Dark
    </button>
    <button
      class="theme-toggle-btn"
      id="high-contrast-btn"
      aria-pressed="false"
      aria-label="Switch to high contrast theme"
      title="High Contrast Mode">
      ⚡ High Contrast
    </button>
  </div>

  <!-- Custom Header -->
  <div class="custom-header">
    <h1>
      <span>🎬</span>
      Movie Booking API
    </h1>
    <p>Comprehensive RESTful API documentation for the Movie Ticket Booking Platform</p>
    <div class="version-badge">v1.0.0</div>
  </div>

  <!-- Swagger UI Container -->
  <div class="swagger-container">
    <div id="swagger-ui"></div>
  </div>

  <!-- Footer -->
  <div class="api-footer">
    <p>
      &copy; 2026 Movie Booking Platform. Documentation powered by
      <a href="https://swagger.io" target="_blank" rel="noopener noreferrer">Swagger/OpenAPI</a>
    </p>
    <p style="margin-top: 0.5rem; font-size: 0.75rem;">
      For issues or suggestions, please contact: support@moviebooking.com
    </p>
  </div>

  <!-- Swagger UI Bundle (served locally) -->
  <script src="/api-docs/swagger-ui-bundle.js" charset="UTF-8"></script>
  <script src="/api-docs/swagger-ui-standalone-preset.js" charset="UTF-8"></script>

  <script>
    // ===== Theme Management =====
    const darkThemeBtn = document.getElementById('dark-theme-btn');
    const highContrastBtn = document.getElementById('high-contrast-btn');
    const root = document.documentElement;

    // Define theme colors
    const themes = {
      dark: {
        '--bg-primary': '#0d1117',
        '--bg-secondary': '#161b22',
        '--bg-tertiary': '#21262d',
        '--bg-hover': '#30363d',
        '--text-primary': '#e6edf3',
        '--text-secondary': '#8b949e',
        '--text-muted': '#6e7681',
        '--border-primary': '#30363d',
        '--border-secondary': '#21262d',
        '--accent-blue': '#58a6ff',
        '--accent-green': '#3fb950',
        '--accent-yellow': '#d29922',
        '--accent-red': '#f85149',
        '--accent-purple': '#bc8cff',
      },
      'high-contrast': {
        '--bg-primary': '#000000',
        '--bg-secondary': '#0a0a0a',
        '--bg-tertiary': '#1a1a1a',
        '--bg-hover': '#2a2a2a',
        '--text-primary': '#ffffff',
        '--text-secondary': '#d0d0d0',
        '--text-muted': '#a0a0a0',
        '--border-primary': '#404040',
        '--border-secondary': '#2a2a2a',
        '--accent-blue': '#7dbeff',
        '--accent-green': '#5fd96a',
        '--accent-yellow': '#ffcc44',
        '--accent-red': '#ff6b6b',
        '--accent-purple': '#d4a6ff',
      },
    };

    // Load saved theme from localStorage
    const savedTheme = localStorage.getItem('swagger-api-theme') || 'dark';
    applyTheme(savedTheme);

    // Event listeners
    darkThemeBtn.addEventListener('click', () => {
      applyTheme('dark');
      localStorage.setItem('swagger-api-theme', 'dark');
    });

    highContrastBtn.addEventListener('click', () => {
      applyTheme('high-contrast');
      localStorage.setItem('swagger-api-theme', 'high-contrast');
    });

    // Apply theme function
    function applyTheme(themeName) {
      // Remove active class from all buttons
      darkThemeBtn.classList.remove('active');
      highContrastBtn.classList.remove('active');

      // Update ARIA pressed states
      darkThemeBtn.setAttribute('aria-pressed', 'false');
      highContrastBtn.setAttribute('aria-pressed', 'false');

      // Get theme colors
      const themeColors = themes[themeName];

      // Apply colors to CSS variables
      for (const [key, value] of Object.entries(themeColors)) {
        root.style.setProperty(key, value);
      }

      // Add high-contrast class if needed
      if (themeName === 'high-contrast') {
        root.classList.add('high-contrast');
        highContrastBtn.classList.add('active');
        highContrastBtn.setAttribute('aria-pressed', 'true');
      } else {
        root.classList.remove('high-contrast');
        darkThemeBtn.classList.add('active');
        darkThemeBtn.setAttribute('aria-pressed', 'true');
      }

      // Log theme change for debugging
      console.log(`Theme switched to: ${themeName}`);
    }

    // ===== Swagger UI Initialization =====
    window.onload = function () {
      // Initialize Swagger UI
      window.ui = SwaggerUIBundle({
        url: '/api-docs/openapi.json', // OpenAPI spec endpoint
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset,
        ],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: 'StandaloneLayout',
        persistAuthorization: true,
        displayRequestDuration: true,
        displayOperationId: false,
        docExpansion: 'list',
        filter: true,
        showExtensions: false,
        showCommonExtensions: false,
        tryItOutEnabled: true,
        requestInterceptor: function (request) {
          console.log('Request:', request);
          return request;
        },
        responseInterceptor: function (response) {
          console.log('Response:', response);
          return response;
        },
        syntaxHighlight: {
          activate: true,
          theme: 'monokai',
        },
        onComplete: function () {
          console.log('Swagger UI initialized successfully');
          // Apply current theme to Swagger UI
          applyTheme(savedTheme);
        },
      });

      // Handle theme switch on button click
      document.addEventListener('keydown', function (event) {
        // Alt + D for dark theme
        if (event.altKey && event.key === 'd') {
          event.preventDefault();
          applyTheme('dark');
          localStorage.setItem('swagger-api-theme', 'dark');
        }
        // Alt + H for high contrast
        if (event.altKey && event.key === 'h') {
          event.preventDefault();
          applyTheme('high-contrast');
          localStorage.setItem('swagger-api-theme', 'high-contrast');
        }
      });
    };

    // Detect system preference and apply it if no saved theme
    if (!localStorage.getItem('swagger-api-theme')) {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const prefersHighContrast = window.matchMedia('(prefers-contrast: more)').matches;

      if (prefersHighContrast) {
        applyTheme('high-contrast');
        localStorage.setItem('swagger-api-theme', 'high-contrast');
      } else if (prefersDark) {
        applyTheme('dark');
        localStorage.setItem('swagger-api-theme', 'dark');
      }
    }
  </script>
</body>
</html>
