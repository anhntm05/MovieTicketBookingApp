services:
  - type: web
    name: movie-ticket-booking-be
    runtime: node
    rootDir: be
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - be/**
        - render.yaml
        - .github/workflows/backend-ci.yml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
